query Input {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      bundleforgeBundleId: attribute(key: "_bundleforge_bundle_id") {
        value
      }
      bundleforgeRules: attribute(key: "_bundleforge_rules") {
        value
      }
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
            isBundleMetafield: metafield(
              namespace: "bundleforge"
              key: "is_bundle"
            ) {
              value
            }
            componentsMetafield: metafield(
              namespace: "bundleforge"
              key: "components"
            ) {
              value
            }
          }
        }
      }
    }
  }
  presentmentCurrencyRate
  shop {
    cartDefaultModeMetafield: metafield(
      namespace: "bundleforge"
      key: "cart_default_mode"
    ) {
      value
    }
  }
}
