query Input {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      mintbundleBundleId: attribute(key: "_mintbundle_bundle_id") {
        value
      }
      mintbundleRules: attribute(key: "_mintbundle_rules") {
        value
      }
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
            isBundleMetafield: metafield(
              namespace: "mintbundle"
              key: "is_bundle"
            ) {
              value
            }
            componentsMetafield: metafield(
              namespace: "mintbundle"
              key: "components"
            ) {
              value
            }
            eligibilityMetafield: metafield(
              namespace: "mintbundle"
              key: "eligibility"
            ) {
              value
            }
            inventoryRulesMetafield: metafield(
              namespace: "mintbundle"
              key: "inventory_rules"
            ) {
              value
            }
          }
        }
      }
    }
    buyerIdentity {
      customer {
        id
      }
    }
  }
  presentmentCurrencyRate
  localization {
    country {
      isoCode
    }
    language {
      isoCode
    }
  }
  shop {
    cartDefaultModeMetafield: metafield(
      namespace: "mintbundle"
      key: "cart_default_mode"
    ) {
      value
    }
  }
}
