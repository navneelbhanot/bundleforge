api_version = "2026-04"

[[extensions]]
type = "function"
name = "MintBundle Cart Transform"
handle = "mintbundle-cart-transform"
description = "Applies bundle pricing at checkout"

  [[extensions.targeting]]
  target = "cart.transform.run"
  input_query = "src/run.graphql"
  export = "run"

  [extensions.build]
  command = ""
  path = "dist/function.wasm"
  # JS function: GraphQL types not required (untyped src/index.js).
  # Skip the default codegen step so we don't need a graphql-codegen
  # config in package.json.
  typegen_command = "echo"
