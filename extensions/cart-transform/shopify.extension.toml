api_version = "2026-04"

[[extensions]]
type = "function"
name = "BundleForge Cart Transform"
handle = "bundleforge-cart-transform"
description = "Applies bundle pricing at checkout"

  [[extensions.targeting]]
  target = "cart.transform.run"
  input_query = "src/run.graphql"
  export = "run"

  [extensions.build]
  command = "npm run build"
  path = "dist/function.wasm"
