query Input {
  cart {
    lines {
      id
      quantity
      mintbundleBundleId: attribute(key: "_mintbundle_bundle_id") {
        value
      }
      mintbundleMin: attribute(key: "_mintbundle_min_items") {
        value
      }
      mintbundleMax: attribute(key: "_mintbundle_max_items") {
        value
      }
    }
  }
}
