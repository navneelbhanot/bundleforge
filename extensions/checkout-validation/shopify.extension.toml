api_version = "2026-04"

[[extensions]]
type = "function"
name = "MintBundle Checkout Validation"
handle = "mintbundle-checkout-validation"
description = "Validates bundle composition at checkout (Plus only)"

  [[extensions.targeting]]
  target = "purchase.validation.run"
  input_query = "src/run.graphql"
  export = "run"

  [extensions.build]
  command = ""
  path = "dist/function.wasm"
  # JS function: GraphQL types not required (untyped src/index.js).
  # Skip the default codegen step so we don't need a graphql-codegen
  # config in package.json.
  typegen_command = "echo"
