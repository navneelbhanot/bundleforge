api_version = "2026-04"

[[extensions]]
type = "function"
name = "BundleForge Checkout Validation"
handle = "bundleforge-checkout-validation"
description = "Validates bundle composition at checkout (Plus only)"

  [[extensions.targeting]]
  target = "purchase.validation.run"
  input_query = "src/run.graphql"
  export = "run"

  [extensions.build]
  command = "npm run build"
  path = "dist/function.wasm"
