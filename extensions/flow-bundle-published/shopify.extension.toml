[[extensions]]
type = "flow_trigger"
handle = "mintbundle-bundle-published"
name = "Bundle published"
description = "Fires when a merchant publishes a bundle"

[settings]

  [[settings.fields]]
  type = "single_line_text_field"
  key = "bundleId"
  name = "Bundle ID"
  description = "Internal MintBundle bundle id (UUID)."

  [[settings.fields]]
  type = "single_line_text_field"
  key = "title"
  name = "Bundle title"
  description = "Merchant-facing title of the bundle."

  [[settings.fields]]
  type = "single_line_text_field"
  key = "bundleType"
  name = "Bundle type"
  description = "Engine type — e.g. mix_and_match, fixed, build_a_box."

  [[settings.fields]]
  type = "single_line_text_field"
  key = "slug"
  name = "Bundle slug"
  description = "URL slug of the bundle product."
