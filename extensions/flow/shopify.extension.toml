api_version = "2026-04"

[[extensions]]
type = "flow_action"
name = "Force inventory sync"
handle = "bundleforge-force-inventory-sync"
description = "Recompute bundle stock from component inventory"
runtime_url = "https://app.bundleforge.app/api/v1/inventory/sync"
schema = "src/force_sync_schema.json"
return_type_ref = "FlowActionResult"

[[extensions]]
type = "flow_trigger"
name = "Bundle published"
handle = "bundleforge-bundle-published"
description = "Fires when a merchant publishes a bundle"
schema = "src/bundle_published_schema.json"

[[extensions]]
type = "flow_trigger"
name = "Bundle low stock"
handle = "bundleforge-bundle-low-stock"
description = "Fires when a bundle's available quantity falls below the threshold"
schema = "src/bundle_low_stock_schema.json"
