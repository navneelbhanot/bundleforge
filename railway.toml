# BundleForge Railway config.
#
# Two services share this repo: web (Express) and worker (BullMQ).
# The AI service deploys separately from `ai-service/` (Dockerfile-based).
# Provision Postgres + Redis as plugins in the same project — Railway
# injects DATABASE_URL and REDIS_URL automatically.
#
# We run TypeScript directly via `tsx` rather than compiling to JS — the
# Shopify SDK v13 + Prisma v6 packaging is a poor fit for a separate
# CJS emit step (see tsconfig comments). `tsx` is a single dependency,
# starts in <100 ms, and avoids dual-tsconfig complexity.

[build]
# Switched from NIXPACKS → DOCKERFILE on 2026-05-07 (session 0206).
# Nixpacks's auto-detection silently dropped Node from the build
# image — `npm: command not found` at the npm ci step. Our
# Dockerfile is explicit (node:20-alpine, COPY scripts/ before
# postinstall, npm ci with extension recursion) and has been the
# working build for all `shopify app deploy` rounds; using it here
# unifies the path. The `buildCommand` field is ignored for
# DOCKERFILE builds — the Dockerfile's RUN steps define the build.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "npm run start:web"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# ─────────────────────────────────────────────────────────────────────────────
# Per-service overrides. Use these by creating two Railway services pointed at
# this repo and selecting the appropriate config in the dashboard.
#
# Both services use the same Dockerfile (which produces a single
# image with all the deps + the built frontend); the per-service
# difference is purely the start command, set as a Railway-level
# override on the service.
#
# Web:
#   startCommand: npm run start:web   (Dockerfile CMD default)
#   (start-web.cjs runs `prisma migrate deploy` inline before booting the
#    server. Avoid `npm run release && npm run start:web` — the `&&` chain
#    swallowed the second half on Railway and masked the actual boot path.)
#
# Worker:
#   startCommand: npm run start:worker  (override Dockerfile CMD)
#   healthcheck: disable (workers don't expose HTTP)
#
# Webhooks worker (optional, can run inline with start:worker):
#   startCommand: npm run start:webhooks-worker
# ─────────────────────────────────────────────────────────────────────────────
