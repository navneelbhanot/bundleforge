name = "BundleForge"
client_id = ""

[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,read_inventory,write_inventory,read_customers,read_themes,write_cart_transforms,read_locations,read_publications,write_publications"

[auth]
redirect_urls = [ "https://your-app-url.com/api/auth/callback" ]

[webhooks]
api_version = "2025-01"

  [webhooks.subscriptions]

  [[webhooks.subscriptions.compliance]]
  topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/api/webhooks"

  [[webhooks.subscriptions.privacy]]
  topics = [ "app/uninstalled" ]
  uri = "/api/webhooks"

[app_proxy]
url = "https://your-app-url.com/api/proxy"
subpath = "bundleforge"
prefix = "apps"

[pos]
embedded = false

[build]
include_config_on_deploy = true
